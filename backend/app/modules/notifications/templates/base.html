<!-- backend/app/modules/notifications/templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ subject }}</title>
    <style>
        /* Reset styles */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        
        /* Global styles */
        body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f5;
        }
        
        /* Container */
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        
        /* Header */
        .email-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            padding: 40px 20px;
            text-align: center;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        
        .tagline {
            color: #bfdbfe;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* Content */
        .email-content {
            padding: 40px 30px;
            color: #18181b;
            line-height: 1.6;
        }
        
        .greeting {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #18181b;
        }
        
        .content-text {
            font-size: 15px;
            color: #52525b;
            margin-bottom: 20px;
        }
        
        /* Button */
        .button-container {
            text-align: center;
            margin: 30px 0;
        }
        
        .button {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.25);
        }
        
        .button:hover {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
        }
        
        /* OTP/Code box */
        .code-box {
            background-color: #f4f4f5;
            border: 2px solid #e4e4e7;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin: 25px 0;
        }
        
        .code {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #1e40af;
            font-family: 'Courier New', monospace;
        }
        
        .code-label {
            font-size: 13px;
            color: #71717a;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Info box */
        .info-box {
            background-color: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .info-box p {
            margin: 0;
            color: #1e40af;
            font-size: 14px;
        }
        
        /* Warning box */
        .warning-box {
            background-color: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .warning-box p {
            margin: 0;
            color: #92400e;
            font-size: 14px;
        }
        
        /* Order details table */
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .details-table td {
            padding: 12px;
            border-bottom: 1px solid #e4e4e7;
        }
        
        .details-table td:first-child {
            font-weight: 600;
            color: #52525b;
            width: 40%;
        }
        
        .details-table td:last-child {
            color: #18181b;
        }
        
        /* Footer */
        .email-footer {
            background-color: #fafafa;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #e4e4e7;
        }
        
        .footer-links {
            margin: 15px 0;
        }
        
        .footer-links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 10px;
            font-size: 13px;
        }
        
        .footer-text {
            color: #71717a;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.5;
        }
        
        .social-icons {
            margin: 20px 0;
        }
        
        .social-icons a {
            display: inline-block;
            margin: 0 8px;
        }
        
        /* Responsive */
        @media only screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
            }
            
            .email-content {
                padding: 30px 20px !important;
            }
            
            .code {
                font-size: 28px !important;
                letter-spacing: 6px !important;
            }
        }
    </style>
</head>
<body>
    <!--[if mso]>
    <style>
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    </style>
    <![endif]-->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
            <td style="padding: 20px 0;">
                <table role="presentation" class="email-container" cellspacing="0" cellpadding="0" border="0">
                    <!-- Header -->
                    <tr>
                        <td class="email-header">
                            <div class="logo">ClearDrive.lk</div>
                            <div class="tagline">Import Your Dream Vehicle from Japan</div>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td class="email-content">
                            {% block content %}
                            <!-- Email content goes here -->
                            {% endblock %}
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td class="email-footer">
                            <div class="footer-links">
                                <a href="https://cleardrive.lk">Home</a>
                                <a href="https://cleardrive.lk/about">About</a>
                                <a href="https://cleardrive.lk/support">Support</a>
                                <a href="https://cleardrive.lk/privacy">Privacy Policy</a>
                            </div>
                            
                            <div class="footer-text">
                                © 2026 ClearDrive.lk. All rights reserved.<br>
                                This email was sent to {{ recipient_email }}<br>
                                <a href="https://cleardrive.lk/unsubscribe" style="color: #3b82f6;">Unsubscribe</a>
                            </div>
                            
                            <div class="footer-text" style="margin-top: 20px;">
                                ClearDrive.lk - Your Trusted Vehicle Import Partner<br>
                                Colombo, Sri Lanka
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
